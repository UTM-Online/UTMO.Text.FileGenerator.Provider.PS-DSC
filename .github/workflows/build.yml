# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: DSC Configuration Generation Build

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
  workflow_dispatch:

env:
  VERSION: 3.3.${{ github.run_number }}
  SOLUTION: src/UTMO.Text.FileGenerator.Provider.PS-DSC.slnx

jobs:
  build:
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    runs-on: 
      group: OnPremRunners

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '1'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        continue-on-error: true
        with:
          global-json-file: src/global.json
        env:
          DOTNET_INSTALL_DIR: 'b:\tools_cache\dotnet'
          DOTNET_ROOT: 'b:\tools_cache\dotnet'
      
      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION }} --no-build --verbosity normal

      - name: Package
        run: dotnet pack ${{ env.SOLUTION }} -c Release -o '${{ github.workspace }}/src/publish' /p:PackageVersion=${{ env.VERSION }}

      - name: Configure Nuget Push Target
        run: dotnet nuget add source --name PHX2 "https://packages.public.utmonline.net/nuget/TextFileGeneration/v3/index.json"
        continue-on-error: true

      - name: Push to Nuget
        run: |
          $packages = Get-ChildItem -Path '${{ github.workspace }}/src/publish/*.nupkg'
          foreach ($package in $packages) {
            Write-Host "Pushing package: $($package.FullName)"
            dotnet nuget push $package.FullName --source PHX2 --skip-duplicate --api-key ${{ secrets.PACKAGES_PUSH_SECRET }}
          }

      - name: Publish Package Metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $orgName = "${{ github.repository }}".Split('/')[0]
          Write-Host "ORG_NAME: $orgName"

          $packagePattern = Join-Path "${{ github.workspace }}" "src/publish/*.nupkg"
          $packages = Get-ChildItem -Path $packagePattern -File

          foreach ($package in $packages) {
            Write-Host "Processing package: $($package.FullName)"
            $packageName = $package.BaseName
            Write-Host "Package name: $packageName"

            # Compute SHA256 digest for the package file.
            $packageDigest = (Get-FileHash -Path $package.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            Write-Host "Package digest: $packageDigest"

            $payload = [ordered]@{
              name = $packageName
              digest = "sha256:$packageDigest"
              logical_environment = "production"
              deployment_name = "nuget-publish-$($env:VERSION)"
            }

            $payloadJson = $payload | ConvertTo-Json -Compress
            $payloadPath = Join-Path $env:RUNNER_TEMP "payload.json"
            Set-Content -Path $payloadPath -Value $payloadJson -Encoding utf8

            Write-Host "=== Payload file contents ==="
            Get-Content -Path $payloadPath
            Write-Host "=== Validating JSON ==="
            $null = $payloadJson | ConvertFrom-Json
            Write-Host "=== Sending request ==="

            try {
              $headers = @{
                Accept = "application/vnd.github+json"
                Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
                "X-GitHub-Api-Version" = "2022-11-28"
              }

              $uri = "https://api.github.com/orgs/$orgName/artifacts/metadata/deployment-record"
              Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -ContentType "application/json" -Body $payloadJson | Out-Null
              Write-Host "Metadata published for package: $packageName"
            }
            catch {
              Write-Warning "Request failed for package '$packageName': $($_.Exception.Message)"
            }
          }

      - name: Create GitHub Release
        run: gh release create v${{ env.VERSION }} --title "Release ${{ env.VERSION }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: published-app
          path: '${{ github.workspace }}/src/UTMO.Text.FileGenerator/publish'
