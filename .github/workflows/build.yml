# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: DSC Configuration Generation Build

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
  workflow_dispatch:

env:
  SOLUTION: src/UTMO.Text.FileGenerator.Provider.PS-DSC.slnx

jobs:
  build:
    outputs:
      version: ${{ steps.version_env.outputs.version }}
      package_version: ${{ steps.package_version.outputs.package_version }}

    permissions:
      contents: read

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate Semantic Version
        uses: mathieudutour/github-tag-action@v6.1
        id: version
        with:
          tag_prefix: "v"
          default_bump: patch
          release_branches: main
          pre_release_branches: ""
          dry_run: true
          github_token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Version Environment Variable
        id: version_env
        shell: pwsh
        run: |
          $newTag = "${{ steps.version.outputs.new_tag }}"
          # Keep only the SemVer core so branch-derived prerelease text is not used in NuGet versions.
          $rawVersion = $newTag -replace '^v', ''
          $rawVersion = $rawVersion.Trim()
          $regex = [Regex]::New('^\d+\.\d+\.\d+')
          if ($regex.IsMatch($rawVersion)) {
            $version = $regex.Match($rawVersion).Value
          }
          else {
            throw "Unable to parse semantic version from tag '$newTag'"
          }
          echo "VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Calculated version: $version"

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        continue-on-error: true
        with:
          global-json-file: src/global.json

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore -c Release /p:Version=${{ env.VERSION }} --verbosity minimal

      - name: Test
        run: dotnet test ${{ env.SOLUTION }} --no-restore --verbosity normal

      - name: Set Package Version
        id: package_version
        shell: pwsh
        run: |
          $suffix = if ('${{ github.ref }}' -eq 'refs/heads/main') { '' } else { "-preview.${{ github.run_number }}" }
          $packageVersion = "${{ env.VERSION }}$suffix"
          echo "PACKAGE_VERSION=$packageVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "package_version=$packageVersion" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          Write-Host "Package version: $packageVersion"

      - name: Package
        run: dotnet pack ${{ env.SOLUTION }} -c Release -o '${{ github.workspace }}/src/publish' /p:PackageVersion=${{ env.PACKAGE_VERSION }} --no-restore

      - name: Publish Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: published-app
          path: '${{ github.workspace }}/src/publish'

  publish:
    needs: build
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v6
        with:
          name: published-app
          path: '${{ github.workspace }}/src/publish'

      - name: Set Version Variables
        shell: pwsh
        run: |
          echo "VERSION=${{ needs.build.outputs.version }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "PACKAGE_VERSION=${{ needs.build.outputs.package_version }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure Nuget Push Target
        run: dotnet nuget add source --name PHX2 "https://packages.public.utmonline.net/nuget/TextFileGeneration/v3/index.json"
        continue-on-error: true

      - name: Push to Nuget
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path '${{ github.workspace }}/src/publish/*.nupkg'
          foreach ($package in $packages) {
            Write-Host "Pushing package: $($package.FullName)"
            dotnet nuget push $package.FullName --source PHX2 --skip-duplicate --api-key ${{ secrets.PACKAGES_PUSH_SECRET }}
          }

      - name: Publish Package Metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoParts = "${{ github.repository }}".Split('/')
          $orgName = $repoParts[0]
          $repoName = $repoParts[1]
          Write-Host "ORG_NAME: $orgName"
          Write-Host "REPO_NAME: $repoName"

          $packagePattern = Join-Path "${{ github.workspace }}" "src/publish/*.nupkg"
          $packages = Get-ChildItem -Path $packagePattern -File

          if (-not $packages) {
            throw "No .nupkg files were found at '$packagePattern'."
          }

          foreach ($package in $packages) {
            Write-Host "Processing package: $($package.FullName)"
            $packageVersion = "$env:PACKAGE_VERSION"
            $packageName = $package.BaseName

            # NuGet package files are typically <id>.<version>.nupkg.
            if ($packageName.EndsWith(".$packageVersion", [System.StringComparison]::OrdinalIgnoreCase)) {
              $packageName = $packageName.Substring(0, $packageName.Length - $packageVersion.Length - 1)
            }

            Write-Host "Package name: $packageName"
            Write-Host "Package version: $packageVersion"

            $packageDigest = (Get-FileHash -Path $package.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            Write-Host "Package digest: $packageDigest"

            $payload = [ordered]@{
              name = $packageName
              version = $packageVersion
              digest = "sha256:$packageDigest"
              status = "deployed"
              logical_environment = "production"
              deployment_name = "nuget-publish-$packageVersion"
              github_repository = $repoName
              tags = [ordered]@{
                registry = "nuget"
                channel = "release"
              }
            }

            $payloadJson = $payload | ConvertTo-Json -Compress
            Write-Host "=== Payload ==="
            Write-Host $payloadJson

            $headers = @{
              Accept = "application/vnd.github+json"
              Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
              "X-GitHub-Api-Version" = "2022-11-28"
            }

            $uri = "https://api.github.com/orgs/$orgName/artifacts/metadata/deployment-record"
            Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -ContentType "application/json" -Body $payloadJson | Out-Null
            Write-Host "Metadata published for package: $packageName@$packageVersion"
          }

      - name: Create GitHub Release
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            RELEASE_FLAG="--latest"
          else
            RELEASE_FLAG="--prerelease"
          fi
          gh release create v${{ needs.build.outputs.package_version }} --repo ${{ github.repository }} --title "Release ${{ needs.build.outputs.package_version }}" --generate-notes $RELEASE_FLAG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
