# This workflow will build a .NET project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-net

name: DSC Configuration Generation Build

on:
  push:
    branches: [ "main" ]
    paths:
      - "src/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "src/**"
  workflow_dispatch:

env:
  VERSION: 3.3.${{ github.run_number }}
  SOLUTION: src/UTMO.Text.FileGenerator.Provider.PS-DSC.slnx
  IS_PRERELEASE: ${{ github.ref != 'refs/heads/main' && github.event_name != 'pull_request' }}
  VERSION_SUFFIX: ${{ github.ref != 'refs/heads/main' && github.event_name != 'pull_request' && '-prerelease' || '' }}

jobs:
  build:
    permissions:
      contents: read

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: '1'

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        continue-on-error: true
        with:
          global-json-file: src/global.json
        #env:
        #  DOTNET_INSTALL_DIR: 'b:\tools_cache\dotnet'
        #  DOTNET_ROOT: 'b:\tools_cache\dotnet'

      - name: Restore dependencies
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore

      - name: Test
        run: dotnet test ${{ env.SOLUTION }} --no-build --verbosity normal

      - name: Package
        run: dotnet pack ${{ env.SOLUTION }} -c Release -o '${{ github.workspace }}/src/publish' /p:PackageVersion=${{ env.VERSION }}${{ env.VERSION_SUFFIX }} --no-restore

      - name: Publish Build Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: published-app
          path: '${{ github.workspace }}/src/publish'

  publish:
    needs: build
    if: github.event_name != 'pull_request' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/heads/release/'))
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write
      artifact-metadata: write

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v6
        with:
          name: published-app
          path: '${{ github.workspace }}/src/publish'

      - name: Configure Nuget Push Target
        run: dotnet nuget add source --name PHX2 "https://packages.public.utmonline.net/nuget/TextFileGeneration/v3/index.json"
        continue-on-error: true

      - name: Push to Nuget
        shell: pwsh
        run: |
          $packages = Get-ChildItem -Path '${{ github.workspace }}/src/publish/*.nupkg'
          foreach ($package in $packages) {
            Write-Host "Pushing package: $($package.FullName)"
            dotnet nuget push $package.FullName --source PHX2 --skip-duplicate --api-key ${{ secrets.PACKAGES_PUSH_SECRET }}
          }

      - name: Publish Package Metadata
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $repoParts = "${{ github.repository }}".Split('/')
          $orgName = $repoParts[0]
          $repoName = $repoParts[1]
          Write-Host "ORG_NAME: $orgName"
          Write-Host "REPO_NAME: $repoName"

          $packagePattern = Join-Path "${{ github.workspace }}" "src/publish/*.nupkg"
          $packages = Get-ChildItem -Path $packagePattern -File

          if (-not $packages) {
            throw "No .nupkg files were found at '$packagePattern'."
          }

          foreach ($package in $packages) {
            Write-Host "Processing package: $($package.FullName)"
            $packageVersion = "$env:VERSION"
            $packageName = $package.BaseName

            # NuGet package files are typically <id>.<version>.nupkg.
            if ($packageName.EndsWith(".$packageVersion", [System.StringComparison]::OrdinalIgnoreCase)) {
              $packageName = $packageName.Substring(0, $packageName.Length - $packageVersion.Length - 1)
            }

            Write-Host "Package name: $packageName"
            Write-Host "Package version: $packageVersion"

            $packageDigest = (Get-FileHash -Path $package.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
            Write-Host "Package digest: $packageDigest"

            $payload = [ordered]@{
              name = $packageName
              version = $packageVersion
              digest = "sha256:$packageDigest"
              status = "deployed"
              logical_environment = "production"
              deployment_name = "nuget-publish-$packageVersion"
              github_repository = $repoName
              tags = [ordered]@{
                registry = "nuget"
                channel = "release"
              }
            }

            $payloadJson = $payload | ConvertTo-Json -Compress
            Write-Host "=== Payload ==="
            Write-Host $payloadJson

            $headers = @{
              Accept = "application/vnd.github+json"
              Authorization = "Bearer ${{ secrets.GITHUB_TOKEN }}"
              "X-GitHub-Api-Version" = "2022-11-28"
            }

            $uri = "https://api.github.com/orgs/$orgName/artifacts/metadata/deployment-record"
            Invoke-RestMethod -Method Post -Uri $uri -Headers $headers -ContentType "application/json" -Body $payloadJson | Out-Null
            Write-Host "Metadata published for package: $packageName@$packageVersion"
          }

      - name: Create GitHub Release
        run: gh release create v${{ env.VERSION }}${{ env.VERSION_SUFFIX }} --title "Release ${{ env.VERSION }}${{ env.VERSION_SUFFIX }}" --generate-notes ${{ env.IS_PRERELEASE == 'true' && '--prerelease' || '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

